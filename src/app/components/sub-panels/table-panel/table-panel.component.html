<div class="table-panel">

  <!-- Back -->
  <button class="back-btn" (click)="editor.setSidebarTab('edit')">
    <svg class="back-icon" viewBox="0 0 24 24">
      <path d="M15 6l-6 6 6 6"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </svg>
    Back
  </button>

  <div class="section">
    <label class="section-label">Table Editor</label>

    <div class="table-wrapper">

      <div class="column-controls-row">
        <div class="column-control-cell"
             *ngFor="let col of rows[0]; let c = index; trackBy: trackByIndex">
          <button class="cell-btn" (click)="toggleAlignment(c)">{{alignments[c]}}</button>
          <button class="cell-btn" (click)="selectColumn(c)">Swap</button>
        </div>
      </div>

      <div class="row-controls-col">
        <button class="cell-btn"
                *ngFor="let r of rows; let i = index; trackBy: trackByIndex"
                (click)="selectRow(i)">
          Swap
        </button>
      </div>

      <!-- TABLE -->
      <table>
        <tr *ngFor="let row of rows; let r = index; trackBy: trackByIndex">
          <td *ngFor="let cell of row; let c = index; trackBy: trackByIndex">
            <input [(ngModel)]="rows[r][c]" class="text-input" />
          </td>
        </tr>
      </table>


      <div class="row-edit">
        <button class="cell-btn" (click)="addRow()">+ Row</button>
        <button class="cell-btn" (click)="removeRow()">– Row</button>
      </div>
    </div>

    <div class="column-edit">
      <button class="cell-btn" (click)="removeColumn()">– Col</button>
      <button class="cell-btn" (click)="addColumn()">+ Col</button>
    </div>
  </div>

  <div class="section actions">
    <button class="primary-btn" *ngIf="!editing" (click)="insert()">Insert</button>
    <button class="primary-btn" *ngIf="editing" (click)="save()">Save</button>
    <button class="danger-btn" *ngIf="editing" (click)="deleteExistingBlock()">Delete</button>
  </div>

  <div *ngIf="showWarning" class="warning-message">{{warningMessage}}</div>

</div>
