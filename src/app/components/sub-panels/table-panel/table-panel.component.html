<div class="table-panel">

  <!-- Back -->
  <button class="back-btn" (click)="editor.setSidebarTab('edit')">
    <svg class="back-icon" viewBox="0 0 24 24">
      <path d="M15 6l-6 6 6 6"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </svg>
    Back
  </button>

  <!-- Section: Table Editor -->
  <div class="section">
    <label class="section-label">Table Editor</label>

    <!-- Column Controls -->
    <div class="column-controls">
      <div class="col-control"
           *ngFor="let col of rows[0]; let c = index; trackBy: trackByIndex">
        <button (click)="toggleAlignment(c)">Align</button>
        <button (click)="selectColumn(c)">Swap</button>
      </div>
    </div>

    <!-- Table Area -->
    <div class="table-area">

      <!-- Row Swap -->
      <div class="row-controls">
        <button *ngFor="let r of rows; let i = index; trackBy: trackByIndex"
                (click)="selectRow(i)">
          Swap
        </button>
      </div>

      <!-- Table Grid -->
      <table>
        <tr *ngFor="let row of rows; let r = index; trackBy: trackByIndex">
          <td *ngFor="let cell of row; let c = index; trackBy: trackByIndex">
            <input [(ngModel)]="rows[r][c]" class="text-input" />
          </td>
        </tr>
      </table>

      <!-- Column Add/Remove -->
      <div class="column-edit">
        <button (click)="addColumn()">+ Col</button>
        <button (click)="removeColumn()">– Col</button>
      </div>

    </div>

    <!-- Row Add/Remove -->
    <div class="row-edit">
      <button (click)="removeRow()">– Row</button>
      <button (click)="addRow()">+ Row</button>
    </div>
  </div>

  <!-- Actions -->
  <div class="section actions">
    <button class="primary-btn" *ngIf="!editing" (click)="insert()">Insert</button>
    <button class="primary-btn" *ngIf="editing" (click)="save()">Save</button>
    <button class="danger-btn" *ngIf="editing" (click)="deleteExistingBlock()">Delete</button>
  </div>

  <!-- Warning -->
  <div *ngIf="showWarning" class="warning-message">{{warningMessage}}</div>

</div>
