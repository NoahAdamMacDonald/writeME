<div class="foldable-panel">
  <button class="back-btn" (click)="editor.setSidebarTab('edit')">
    Back
  </button>

  <div class="section">
    <label class="section-label">Summary</label>
    <input class="text-input" [(ngModel)]="summary" />
  </div>

  <div class="section">
    <label class="section-label">Content Lines</label>
    <div class="line-row" *ngFor="let line of lines; let index = index; trackBy: trackByIndex">
      <input class="text-input" [(ngModel)]="lines[index]" />
      <button (click)="removeLine(index)"
              class="delete-line-btn"
              [disabled]="lines.length===1">
              Remove
      </button>
    </div>

    <button class="add-line-btn" (click)="addLine()">+ Add Line</button>
  </div>

  <div class="section actions">
    <!--New Block-->
    <button class="danger-btn" *ngIf="!editing" (click)="deleteAll()">Delete Foldable</button>
    <button class="primary-btn" *ngIf="!editing" (click)="insert()">Insert</button>

    <!--Existing Block-->
    <button class="primary-btn" *ngIf="editing" (click)="save()">Save</button>
    <button class="danger-btn" *ngIf="editing" (click)="deleteExistingBlock()">Delete</button>

    <button class="secondary-btn" (click)="copyToClipboard()">Copy to Clipboard</button>
  </div>

  <div *ngIf="showWarning" class="warning-message">{{warningMessage}}</div>
</div>
