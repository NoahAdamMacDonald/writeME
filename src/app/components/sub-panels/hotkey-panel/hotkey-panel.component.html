<div class="hotkey-panel">

  <button class="back-btn" (click)="editor.setSidebarTab('edit')">
    <svg class="back-icon" viewBox="0 0 24 24">
      <path d="M15 6l-6 6 6 6"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </svg>
    Back
  </button>

  <label class="section-label">Insert Hotkey</label>

  <input
    class="text-input"
    placeholder="Hotkey text"
    [(ngModel)]="text"
  />

  <div *ngFor="let group of hotkeyGroups" class="hotkey-group">

    <button
      class="dropdown-toggle"
      type="button"
      data-bs-toggle="collapse"
      [attr.data-bs-target]="'#group-' + group.category"
    >
      {{ group.category }}
    </button>

    <div
      class="collapse show"
      [id]="'group-' + group.category"
    >
      <div class="hotkey-grid">
        <button
          class="symbol-btn"
          *ngFor="let h of group.keys"
          (click)="addSymbol(h.symbol)"
        >
          {{h.symbol}}
          <span class="name">{{h.name}}</span>
        </button>
      </div>
    </div>

  </div>

  <div class="actions">
    <button class="primary-btn" *ngIf="!editing" (click)="insert()">Insert</button>
    <button class="primary-btn" *ngIf="editing" (click)="save()">Save</button>
    <button class="danger-btn" *ngIf="editing" (click)="deleteExistingHotkey()">Delete</button>
  </div>

  <div *ngIf="showWarning" class="warning-message">{{warningMessage}}</div>

</div>
