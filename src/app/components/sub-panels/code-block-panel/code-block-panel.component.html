<div class="code-block-panel">

  <button class="back-btn" (click)="editor.setSidebarTab('edit')">
    <svg class="back-icon" viewBox="0 0 24 24">
      <path d="M15 6l-6 6 6 6"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </svg>
    Back
  </button>

  <div class="section">
    <label class="section-label">Language</label>

    <div class="language-list">
      <button
        type="button"
        class="language-item"
        *ngFor="let lang of languages"
        (click)="language = lang"
        [class.selected]="language === lang">
        {{ lang }}
      </button>
    </div>
  </div>

  <div class="section">
    <label class="section-label">Code</label>
    <textarea
      class="code-input"
      [(ngModel)]="code"
      (keydown)="handleKey($event)"
    ></textarea>
  </div>

  <div class="section actions">

    <!-- Existing block -->
    <button class="danger-btn"
            *ngIf="editing"
            (click)="deleteExistingBlock()">
      Delete
    </button>

    <button class="primary-btn"
            *ngIf="editing"
            (click)="save()">
      Save
    </button>

    <!-- New block -->
    <button class="primary-btn"
            *ngIf="!editing"
            (click)="insert()">
      Insert
    </button>

  </div>

  <div *ngIf="showWarning" class="warning-message">
    {{ warningMessage }}
  </div>

</div>
