<div class="code-block-panel">

  <button class="back-btn" (click)="editor.setSidebarTab('edit')">
    <svg class="back-icon" viewBox="0 0 24 24">
      <path d="M15 6l-6 6 6 6"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </svg>
    Back
  </button>

  <div class="section">
    <div class="search-bar">
      <input
        type="text"
        placeholder="Search languages..."
        [(ngModel)]="searchTerm"
        (input)="applySearch()"
      />
    </div>

      <div class="section-header"
       data-bs-toggle="collapse"
       data-bs-target="#languageDropdown"
       aria-expanded="true">

    <span>Languages ({{ filteredLanguages.length }})</span>

    <svg class="chevron" viewBox="0 0 24 24">
      <path d="M6 9l6 6 6-6"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </svg>
  </div>

    <div id="languageDropdown" class="collapse show">
      <div class="language-dropdown-body">
        <button
          type="button"
          class="language-item"
          *ngFor="let lang of filteredLanguages"
          (click)="language = lang; updateHighlight()"
          [class.selected]="language === lang">
          {{ lang }}
        </button>
      </div>
    </div>
  </div>

  <div class="section">
    <label class="section-label">Code</label>

    <div class="code-editor">
      <pre class="highlight-layer hljs" [innerHTML]="highlightedCode"></pre>

      <textarea
        class="code-input"
        [(ngModel)]="code"
        (input)="updateHighlight()"
        (keydown)="handleKey($event)"
        (scroll)="syncScroll($event)"
        spellcheck="false"
      ></textarea>
    </div>
  </div>

  <div *ngIf="showWarning" class="warning-message">
    {{ warningMessage }}
  </div>

  <div class="section actions">
    <!--Existing Block-->
    <button class="danger-btn"
            *ngIf="editing"
            (click)="deleteExistingBlock()">
      Delete
    </button>

    <button class="primary-btn"
            *ngIf="editing"
            (click)="save()">
      Save
    </button>

    <!--New Block-->
    <button class="primary-btn"
            *ngIf="!editing"
            (click)="insert()">
      Insert
    </button>

  </div>
</div>
