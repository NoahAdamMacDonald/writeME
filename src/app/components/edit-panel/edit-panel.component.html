<div class="edit-panel">

  <!-- Section Template -->
  <div class="section">
    <div class="section-header collapsed"
         data-bs-toggle="collapse"
         data-bs-target="#headingsCollapse"
         aria-expanded="false">
      <span>Headings</span>
      <svg class="chevron" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div id="headingsCollapse" class="collapse">
      <div class="section-body">
        <button (click)="setHeading(1)">H1</button>
        <button (click)="setHeading(2)">H2</button>
        <button (click)="setHeading(3)">H3</button>
        <button (click)="setHeading(4)">H4</button>
      </div>
    </div>
  </div>

  <!-- Typography -->
  <div class="section">
    <div class="section-header collapsed"
         data-bs-toggle="collapse"
         data-bs-target="#typographyCollapse"
         aria-expanded="false">
      <span>Typography</span>
      <svg class="chevron" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div id="typographyCollapse" class="collapse">
      <div class="section-body">
        <button (click)="wrap('**')">Bold</button>
        <button (click)="wrap('_')">Italic</button>
        <button (click)="wrap('~~')">Strikethrough</button>
      </div>
    </div>
  </div>

  <!-- Alerts -->
  <div class="section">
    <div class="section-header collapsed"
         data-bs-toggle="collapse"
         data-bs-target="#alertsCollapse"
         aria-expanded="false">
      <span>Alerts</span>
      <svg class="chevron" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div id="alertsCollapse" class="collapse">
      <div class="section-body">
        <button (click)="setAlert('NOTE')">Note</button>
        <button (click)="setAlert('TIP')">Tip</button>
        <button (click)="setAlert('WARNING')">Warning</button>
        <button (click)="setAlert('IMPORTANT')">Important</button>
        <button (click)="setAlert('CAUTION')">Caution</button>
        <button (click)="setAlert('QUOTE')">Quotes</button>
      </div>
    </div>
  </div>

  <!-- Lists -->
  <div class="section">
    <div class="section-header collapsed"
         data-bs-toggle="collapse"
         data-bs-target="#listsCollapse"
         aria-expanded="false">
      <span>Lists</span>
      <svg class="chevron" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div id="listsCollapse" class="collapse">
      <div class="section-body">
        <button (click)="setList('- ')">Bullet</button>
        <button (click)="setList('1. ')">Numbered</button>
        <button (click)="setList('- [ ] ')">Task</button>
      </div>
    </div>
  </div>

  <!-- Code -->
  <div class="section">
    <div class="section-header collapsed"
         data-bs-toggle="collapse"
         data-bs-target="#codeCollapse"
         aria-expanded="false">
      <span>Code</span>
      <svg class="chevron" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div id="codeCollapse" class="collapse">
      <div class="section-body">
        <button (click)="wrap('`')">Inline Code</button>
        <button (click)="insertCodeBlock()">Code Block</button>
      </div>
    </div>
  </div>

  <!-- Links -->
  <div class="section">
    <div class="section-header collapsed"
         data-bs-toggle="collapse"
         data-bs-target="#linksCollapse"
         aria-expanded="false">
      <span>Links</span>
      <svg class="chevron" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div id="linksCollapse" class="collapse">
      <div class="section-body">
        <button (click)="insertLink()">Link URL</button>
      </div>
    </div>
  </div>

  <!--Misc-->
  <div class="section">
        <div class="section-header collapsed"
         data-bs-toggle="collapse"
         data-bs-target="#miscCollapse"
         aria-expanded="false">
      <span>Misc</span>
      <svg class="chevron" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div id="miscCollapse" class="collapse">
      <div class="section-body">
      </div>
    </div>
  </div>
</div>
