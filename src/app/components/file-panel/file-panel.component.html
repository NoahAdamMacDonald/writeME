<div class="file-panel">
  <button (click)="importFile()">
    <svg class="icon" viewBox="0 0 24 24">
      <path fill="currentColor"
        d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0
           1.1.9 2 2 2h16c1.1 0 2-.9
           2-2V8c0-1.1-.9-2-2-2zm-6
           9l-4-4 1.41-1.41L13 11.17V4h2v7.17l1.59-1.58L18
           11l-4 4z"/>
    </svg>
    Import File
  </button>

  <button (click)="exportFile()">
    <svg class="icon" viewBox="0 0 24 24">
      <path fill="currentColor"
        d="M5 20h14v-2H5v2zm7-18l-5.5
           5.5h4v6h3v-6h4L12 2z"/>
    </svg>
    Export File
  </button>

  <button (click)="copyToClipboard()">
    <svg class="icon" viewBox="0 0 24 24">
      <path fill="currentColor"
        d="M16 1H4c-1.1 0-2 .9-2
           2v14h2V3h12V1zm3 4H8c-1.1
           0-2 .9-2 2v14c0 1.1.9 2 2
           2h11c1.1 0 2-.9
           2-2V7c0-1.1-.9-2-2-2zm0
           16H8V7h11v14z"/>
    </svg>
    Copy to Clipboard
  </button>

  <div class="divider-line"></div>

  <div class="ai-section">
    <button (click)="formatWithAI()">
      <svg class="icon" viewBox="0 0 24 24">
        <path fill="currentColor"
          d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      Format with AI
    </button>

    <button (click)="ocrImage()">
      <svg class="icon" viewBox="0 0 24 24">
        <path fill="currentColor"
          d="M21 19V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14h2V5h14v14h2zM8 7h8v2H8V7zm0 4h8v2H8v-2zm0 4h5v2H8v-2z"/>
      </svg>
      Image to Text
    </button>

    <button (click)="ocrAndFormat()">
      <svg class="icon" viewBox="0 0 24 24">
        <path fill="currentColor"
          d="M12 2L3 7v10l9 5 9-5V7l-9-5zm0 2.18L18.09 7 12 10.82 5.91 7 12 4.18zM5 9.91l6 3.55v6.64L5 16.55V9.91zm8 10.19v-6.64l6-3.55v6.64l-6 3.55z"/>
      </svg>
      Image to Markdown
    </button>

    <div class="powered-by">
      Powered by Groq
    </div>
  </div>


  <input
    type="file"
    #fileInput
    accept=".md, .txt"
    (change)="handleFile($event)"
    hidden
  />

  <div *ngIf="showSuccess" class="confirmation">
    {{successMessage}}
  </div>
</div>
