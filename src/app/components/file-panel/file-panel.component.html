<div class="file-panel">
  <button (click)="importFile()">
    <svg class="icon" viewBox="0 0 24 24">
      <path fill="currentColor"
        d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0
           1.1.9 2 2 2h16c1.1 0 2-.9
           2-2V8c0-1.1-.9-2-2-2zm-6
           9l-4-4 1.41-1.41L13 11.17V4h2v7.17l1.59-1.58L18
           11l-4 4z"/>
    </svg>
    Import File
  </button>

  <button (click)="exportFile()">
    <svg class="icon" viewBox="0 0 24 24">
      <path fill="currentColor"
        d="M5 20h14v-2H5v2zm7-18l-5.5
           5.5h4v6h3v-6h4L12 2z"/>
    </svg>
    Export File
  </button>

  <button (click)="copyToClipboard()">
    <svg class="icon" viewBox="0 0 24 24">
      <path fill="currentColor"
        d="M16 1H4c-1.1 0-2 .9-2
           2v14h2V3h12V1zm3 4H8c-1.1
           0-2 .9-2 2v14c0 1.1.9 2 2
           2h11c1.1 0 2-.9
           2-2V7c0-1.1-.9-2-2-2zm0
           16H8V7h11v14z"/>
    </svg>
    Copy to Clipboard
  </button>

  <div class="divider-line"></div>

  <div class="ai-section">
    <button (click)="formatWithAI()">
      <svg class="icon" viewBox="0 0 24 24">
        <path fill="currentColor"
          d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      Format with AI
    </button>

    <div class="ai-inline-row">
      <button (click)="regenerateFormatting()">
        <svg class="icon" viewBox="0 0 24 24">
          <path fill="currentColor"
            d="M17.65 6.35A7.95 7.95 0 0012 4a8 8 0 108 8h-2a6 6 0 11-6-6c1.66 0 3.14.67 4.24 1.76L14 11h6V5l-2.35 2.35z"/>
        </svg>
        Regenerate
      </button>

      <button (click)="revertFormatting()">
        <svg class="icon" viewBox="0 0 24 24">
          <path fill="currentColor"
            d="M12 5c-4.42 0-8 3.58-8 8H2l3.89 3.89L9.78 13H6c0-3.31 2.69-6 6-6s6 2.69 6 6-2.69 6-6 6v2c4.42 0 8-3.58 8-8s-3.58-8-8-8z"/>
        </svg>
        Revert
      </button>
    </div>

    <div class="powered-by">
      Powered by Groq
    </div>
  </div>



  <input
    type="file"
    #fileInput
    accept=".md, .txt"
    (change)="handleFile($event)"
    hidden
  />

  <div *ngIf="showSuccess" class="confirmation">
    {{successMessage}}
  </div>
</div>
