<div class="editor-container">
  <div class="line-numbers">
    <div *ngFor="let line of lines; let i = index"
         [class.active]="i + 1 === activeLine">
      {{ i + 1 }}
    </div>
  </div>

  <div class="editor-area">
    <textarea
      #textarea
      class="editor-input"
      [(ngModel)]="content"
      (input)="onInput($event)"
      (click)="onClick($event)"
      (keyup)="onKeyUp($event)"
      (scroll)="syncScroll($event)"
      (keydown)="onKeyDown($event)"
    ></textarea>
  </div>
</div>
