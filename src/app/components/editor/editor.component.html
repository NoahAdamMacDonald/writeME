<div class="editor-container">
  <div class="line-numbers">
    <div *ngFor="let line of lines; let i = index"
      [class.active]="i+1 === activeLine">
      {{i+1}}
    </div>
  </div>

  <textarea
    class="editor-input"
    [(ngModel)]="content"
    (input)="updateLines()"
    (scroll)="syncScroll($event)"
    (keyup)="onKeyUp($event)"
    (click)="onKeyUp($event)"
    (keydown)="handleTabs($event)"></textarea>
</div>
