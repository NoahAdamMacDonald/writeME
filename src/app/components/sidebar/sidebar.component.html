<div class="sidebar-inner">

  <div class="brand">
    WriteME
  </div>

  <div class="tabs">
    <button
      (click)="setTab('file')"
      [class.active]="editor.sidebarTab()  === 'file'">
      File
    </button>

    <button
      (click)="setTab('edit')"
      [class.active]="editor.sidebarTab() === 'edit'">
      Edit
    </button>

    <button
      (click)="setTab('icons')"
      [class.active]="editor.sidebarTab() === 'icons'">
      Emoji
    </button>
  </div>

  <!--Mobile warning screen-->
  <div *ngIf="isSmallScreen && !dismissedWarning" class="screen-warning">
    <svg class="warn-icon" viewBox="0 0 24 24">
      <path fill="currentColor"
        d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
    </svg>

    <button class="close-btn" (click)="dismissWarning()">X</button>

    WriteME is not designed for small screens.
    For best experience please use a desktop size screen.
  </div>

  <div class="panel">
    <app-file-panel *ngIf="editor.sidebarTab() === sidebarTabs.File"></app-file-panel>
    <app-edit-panel *ngIf="editor.sidebarTab() === sidebarTabs.Edit"></app-edit-panel>
    <app-icon-panel *ngIf="editor.sidebarTab() === sidebarTabs.Icons"></app-icon-panel>
    <app-foldable-panel *ngIf="editor.sidebarTab() === sidebarTabs.Foldable"></app-foldable-panel>
    <app-link-url-panel *ngIf="editor.sidebarTab() === sidebarTabs.LinkUrl"></app-link-url-panel>
    <app-link-section-panel *ngIf="editor.sidebarTab () === sidebarTabs.LinkSection"></app-link-section-panel>
    <app-image-embed-panel *ngIf="editor.sidebarTab() === sidebarTabs.ImageEmbed"></app-image-embed-panel>
    <app-youtube-embed-panel *ngIf="editor.sidebarTab() === sidebarTabs.YoutubeEmbed"></app-youtube-embed-panel>
    <app-code-block-panel *ngIf="editor.sidebarTab() === sidebarTabs.CodeBlock"></app-code-block-panel>
    <app-table-panel *ngIf="editor.sidebarTab() === sidebarTabs.Table"></app-table-panel>
  </div>

</div>
