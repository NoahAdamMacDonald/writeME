<div class="sidebar-inner">

  <div class="brand">
    WriteME
  </div>

  <div class="tabs">
    <button
      (click)="setTab('file')"
      [class.active]="activeTab === 'file'">
      File
    </button>

    <button
      (click)="setTab('edit')"
      [class.active]="activeTab === 'edit'">
      Edit
    </button>

    <button
      (click)="setTab('icons')"
      [class.active]="activeTab === 'icons'">
      Icons
    </button>
  </div>

  <!--Mobile warning screen-->
  <div *ngIf="isSmallScreen && !dismissedWarning" class="screen-warning">
    <svg class="warn-icon" viewBox="0 0 24 24">
      <path fill="currentColor"
        d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
    </svg>

    <button class="close-btn" (click)="dismissWarning()">X</button>

    WriteME is not designed for small screens.
    For best experience please use a desktop size screen.
  </div>

  <div class="panel">
    <app-file-panel *ngIf="activeTab === 'file'"></app-file-panel>
    <app-edit-panel *ngIf="activeTab === 'edit'"></app-edit-panel>
    <app-icon-panel *ngIf="activeTab === 'icons'"></app-icon-panel>
  </div>

</div>
